<script type="text/plain" id="nc-1">@echo off

set current_path=%~dp0
set cellular_interface="cellular 137"
set cellular_service="DW5826eService"
set adb=%current_path%adb

:menu
echo /*==============================================================================*/
echo /*  1.mbim_info  2.driver_info  3.device_manager  4.at_commands   5.inf_verify  */
echo /* 11.wireshark 12.telephony   13.textanalysis   14.teraterm     15.PEP         */
echo /* 21.sku_set   22.test_set    23.driver_del     24.service      25.ACPI        */
echo /* 31.nettrace  32.driver_log  33.QXDM           34.flash        35.adb         */
echo /* 41.traceview 42.usbview                       88.exit         99.edit        */
echo /*===============================================================v2.0===========*/
set /p choice=select (1-99):

if "%choice%"=="1" goto menu_mbim
if "%choice%"=="2" goto driver_info
if "%choice%"=="3" goto dm_open
if "%choice%"=="4" goto menu_at_commands
if "%choice%"=="5" goto inf_verify
if "%choice%"=="11" goto wireshark_open
if "%choice%"=="12" goto TelephonyTool
if "%choice%"=="13" goto TextAnalysisTool.NET
if "%choice%"=="14" goto teraterm
if "%choice%"=="15" goto menu_pep
if "%choice%"=="21" goto sku_set
if "%choice%"=="22" goto test_set
if "%choice%"=="23" goto menu_driver_del
if "%choice%"=="24" goto menu_service
if "%choice%"=="25" goto menu_acpi
if "%choice%"=="31" goto menu_nettrace
if "%choice%"=="32" goto menu_driver_log
if "%choice%"=="33" goto qxdm
if "%choice%"=="34" goto menu_flash
if "%choice%"=="35" goto menu_adb
if "%choice%"=="41" goto traceview
if "%choice%"=="42" goto usbview
if "%choice%"=="88" goto exit
if "%choice%"=="99" goto edit

echo Input invalid!
pause
goto menu

:menu_at_commands
echo /*==============================================================================*/
echo /* 1.AT*UCOMP=1,1,101F   2.AT*BBOOTHOLD=edl  3.AT*MPCFCCAUTH?  4.AT*BRESET      */
echo /* 9.back                                                                       */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto UCOMP
if "%choice%"=="2" goto BBOOTHOLD
if "%choice%"=="3" goto MPCFCCAUTH
if "%choice%"=="4" goto BRESET
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_at_commands

:menu_mbim
echo /*==============================================================================*/
echo /* 1.radio   2.interfaces  3.signal  4.ready_info  9.back                       */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto radio
if "%choice%"=="2" goto interfaces
if "%choice%"=="3" goto signal
if "%choice%"=="4" goto ready_info
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_mbim

:menu_nettrace
echo /*==============================================================================*/
echo /* 1.start  2.stop  3.del_registry  9.back                                      */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto nettrace_start
if "%choice%"=="2" goto nettrace_stop
if "%choice%"=="3" goto nettrace_delete
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_nettrace

:menu_driver_log
echo /*==============================================================================*/
echo /* 1.start  2.stop  9.back                                                      */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto driver_log_start
if "%choice%"=="2" goto driver_log_stop
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_driver_log

:menu_driver_del
echo /*==============================================================================*/
echo /* 1.DW5826_del  2.driver_del  9.back                                           */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto DW5826_del
if "%choice%"=="2" goto driver_del
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_driver_del

:menu_service
echo /*==============================================================================*/
echo /* 1.start  2.stop  3.check  4.fw_disable  5.fw_enable  9.back                  */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto service_start
if "%choice%"=="2" goto service_stop
if "%choice%"=="3" goto service_check
if "%choice%"=="4" goto fw_disable
if "%choice%"=="5" goto fw_enable
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_service

:menu_flash
echo /*==============================================================================*/
echo /* 1.start  2.check  9.back                                                     */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto flash_start
if "%choice%"=="2" goto flash_check
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_flash

:menu_adb
echo /*========================================================================*/
echo /* 1.shell   2.w_disable   3.qbi_log_start  4.qbi_log_stop  5.qbi_log_pull*/
echo /* 6.remount 7.qbi_log_size                                 9.back        */
echo /*========================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto shell
if "%choice%"=="2" goto w_disable
if "%choice%"=="3" goto qbi_log_start
if "%choice%"=="4" goto qbi_log_stop
if "%choice%"=="5" goto qbi_log_pull
if "%choice%"=="6" goto remount_root
if "%choice%"=="7" goto qbi_log_size
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_adb

:menu_acpi
echo /*==============================================================================*/
echo /* 1.dump  9.back                                                               */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto acpi_dump
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_acpi

:menu_pep
echo /*==============================================================================*/
echo /* 1.PEP checker  9.back                                                        */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto pep_checker
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_pep

:UCOMP
start "" "%current_path%M2PE_Tool\M2PE_Tool.exe" AT*UCOMP=1,1,101F
goto menu

:BBOOTHOLD
start "" "%current_path%M2PE_Tool\M2PE_Tool.exe" AT*BBOOTHOLD=edl
goto menu

:MPCFCCAUTH
start "" "%current_path%M2PE_Tool\M2PE_Tool.exe" AT*MPCFCCAUTH?
goto menu

:BRESET
start "" "%current_path%M2PE_Tool\M2PE_Tool.exe" AT*BRESET
goto menu

:radio
netsh mbn show radio %cellular_interface%
netsh mbn show connection %cellular_interface%
goto menu

:interfaces
netsh mbn show interfaces
goto menu

:signal
netsh mbn show signal %cellular_interface%
goto menu

:ready_info
netsh mbn show readyinfo %cellular_interface%
goto menu

:nettrace_start
netsh trace start wireless_dbg,provisioning overwrite=yes persist=yes level=5 capture=yes maxSize=0 filemode=single
goto menu

:nettrace_stop
netsh trace stop
goto menu

:nettrace_delete
echo Delete all NetTrace folder under "HKEY_LOCAL_MACHINE\SYSTEM\ControlSet001\Control\WMI\Autologger"
echo HKEY_LOCAL_MACHINE\SYSTEM\ControlSet001\Control\WMI\Autologger | clip
regedit.exe
goto menu

:commands
echo AT*UCOMP=1,1,101F
echo AT*BBOOTHOLD=edl
echo AT*MPCFCCAUTH?
echo AT*BPCINFO?
echo AT*BRESET
goto menu

:sku_set
reg add "HKEY_LOCAL_MACHINE\HARDWARE\DESCRIPTION\System\BIOS" /v "SystemSKU" /t REG_SZ /d "0CB2" /f
goto menu

:test_set
bcdedit /set testsigning on
echo Reboot the machine to enable Testing mode.
pause
goto menu

:driver_info
echo Driver info under "HKEY_LOCAL_MACHINE\SYSTEM\ControlSet001\Enum\USB\VID_413C&PID_8217&MI_XX"
echo HKEY_LOCAL_MACHINE\SYSTEM\ControlSet001\Enum\USB\ | clip
regedit.exe
goto menu

:dm_open
start devmgmt.msc
goto menu

:wireshark_open
echo Add filter parameters "--p=Microsoft-Windows-Wmbclass-Opn"
echo netsh trace convert .\netracelog.etl .\netracelog.txt
echo Get-Content netracelog.txt | Where-Object {$_ -notmatch "No Format Information found"} | Set-Content netracelog_clean.txt
start "" "%current_path%WiresharkPortable64\WiresharkPortable64.exe"
goto menu

:TelephonyTool
start "" "%current_path%TelephonyTool\TelephonyTool.exe"
goto menu

:TextAnalysisTool.NET
start "" "%current_path%TextAnalysisTool.NET\TextAnalysisTool.NET.exe"
goto menu

:teraterm
start "" "C:\Program Files (x86)\teraterm5\ttermpro.exe"
goto menu

:DW5826_del
start "" "C:\Program Files (x86)\Dell Inc\DW5826e\uninstall.exe"
goto menu

:driver_del
start "" "%current_path%DriverStoreExplorer.v0.11.92\Rapr.exe"
goto menu

:driver_log_start
%current_path%\Host_driver_log\"Enable host log.bat"
goto menu

:driver_log_stop
echo Delete all setting
reg delete "HKLM\system\ControlSet001\Control\WMI\Autologger\QNET" /f
reg delete "HKLM\system\ControlSet001\Control\WMI\Autologger\MHI" /f
pause
goto menu

:inf_verify
set directory=%current_path%\infverify
for %%f in ("%directory%\*.inf") do (
  %current_path%infverify\infverif.exe /h /v %%f
)
goto menu

:qxdm
start "" "C:\Program Files\Qualcomm\QXDM5\QXDM.exe" /config "%current_path%\QXDM\Default+QBI.dmc"
goto menu

:service_start
sc start %cellular_service%
goto menu

:service_stop
sc stop %cellular_service%
goto menu

:service_check
sc query %cellular_service% | findstr /i "RUNNING"
if %errorlevel% equ 0 (
  echo %cellular_service% start
) else (
  echo %cellular_service% stop
)
goto menu

:fw_disable
echo "HKEY_LOCAL_MACHINE\SYSTEM\ControlSet001\Control\Palcom\DW5826eService"
reg add "HKEY_LOCAL_MACHINE\SYSTEM\ControlSet001\Control\Palcom\DW5826eService" /v "FWUpdate" /t REG_SZ /d "No" /f
goto menu

:fw_enable
echo "HKEY_LOCAL_MACHINE\SYSTEM\ControlSet001\Control\Palcom\DW5826eService"
reg add "HKEY_LOCAL_MACHINE\SYSTEM\ControlSet001\Control\Palcom\DW5826eService" /v "FWUpdate" /t REG_SZ /d "auto" /f
goto menu

:flash_start
start "" "%current_path%UT_Flash_Tool\ZXL1_ZXL2_FlashTool_V2.0.3.8_4K\Tool\FlashTool.exe"
goto menu

:flash_check
start "" "%current_path%UT_Flash_Tool\ZXL1_ZXL2_FlashTool_V2.0.3.8_4K\UMI\UMI.exe"
goto menu

:shell
start .
start cmd /k "%adb% wait-for-device shell"
goto menu

:remount_root
start .
start cmd /k "%adb% wait-for-device && %adb% shell mount -o remount,rw /dev/root /"
goto menu

:w_disable
%adb% wait-for-device && %adb% shell cat /sys/kernel/debug/gpio && %adb% shell cat /data/persist/rfs/shared/w_disable
goto menu

:qbi_log_start
%adb% wait-for-device && %adb% shell touch /data/mbimd/qbi_enable_logging &&  %adb% shell "printf '\x80\x84\x1E\x00' > /data/mbimd/qbi_enable_logging" && %adb% shell chown radio:radio /data/mbimd/qbi_enable_logging
echo "Reboot module to start logging"
goto menu

:qbi_log_stop
%adb% wait-for-device && %adb% shell rm -rf /data/mbimd/qbi_enable_logging && %adb% shell rm -rf /data/mbimd/qbi_current_log_file.txt && %adb% shell rm -rf /data/mbimd/qbi_previous_file.txt && %adb% shell rm -rf /data/mbimd/*.txt
goto menu

:qbi_log_pull
%adb% wait-for-device && %adb% pull /data/mbimd/qbi_current_log_file.txt %current_path%\log\qbi_current_log_file.txt && %adb% pull /data/mbimd/qbi_previous_log_file.txt %current_path%\log\qbi_previous_log_file.txt && %adb% pull /data/mbimd/qbi_oldest_log_file.txt %current_path%\log\qbi_oldest_log_file.txt
goto menu

:qbi_log_size
echo adb shell "printf '\x80\x84\x1E\x00' ^> /data/mbimd/qbi_enable_logging"
goto menu

:acpi_dump
echo ACPI Dump...
start "ACPI Dump" cmd /k "cd /d "%current_path%iasl-win-20250404\" && del *.dat *.dsl /q && acpidump.exe -b -o acpi_tables.dat && iasl.exe -d *.dat && del *.dat"
goto menu

:pep_checker
echo PEP Checker...
start "PEP Checker" cmd /k "cd /d "%current_path%PEP Checker v2.2.2.3\" && PEPChecker.exe"
goto menu

:traceview
start "" "%current_path%traceview\traceview.exe"
goto menu

:usbview
start "" "%current_path%usbview\usbview.exe"
goto menu

:exit
exit

:edit
notepad "%current_path%_mbn_show.bat"
pause</script>

<script type="text/plain" id="nc-3"># === Build System Image (soong) ===

make -C msm-compal-cw O=../out ARCH=arm CROSS_COMPILE=arm-linux-androidkernel- KCFLAGS=-mno-android -j16

# === Build LK Bootloader ===
make -C ./ \
  TOOLCHAIN_PREFIX=/home/ali/dailybuild/tools/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/bin/arm-linux-androideabi- \
  BOOTLOADER_OUT=./out/target/product/msm8909w/obj/EMMC_BOOTLOADER_OBJ \
  msm8909 EMMC_BOOT=1 SIGNED_KERNEL=1 VERIFIED_BOOT=1 DEFAULT_UNLOCK=true \
  BOARD_NAME=triton ENABLE_VB_ATTEST=1 OSVERSION_IN_BOOTIMAGE=1 \
  ENABLE_BG_SUPPORT=1 ENABLE_DISPLAY=1 TARGET_WEAR_SUPPORT_KM3=true

# === Build BG Firmware ===
build_bg_min_image.bat p9764_01-bg2asic-llvm-rel-uart
build_bg_min_image.bat p9764_02-bg2asic-llvm-rel-uart

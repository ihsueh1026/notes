<script type="text/plain" id="nc-1">@echo off

set current_path=%~dp0
set cellular_interface="cellular 137"
set cellular_service="DW5826eService"
set adb=%current_path%adb

:menu
echo /*==============================================================================*/
echo /*  1.mbim_info  2.driver_info  3.device_manager  4.at_commands   5.inf_verify  */
echo /* 11.wireshark 12.telephony   13.textanalysis   14.teraterm     15.PEP         */
echo /* 21.sku_set   22.test_set    23.driver_del     24.service      25.ACPI        */
echo /* 31.nettrace  32.driver_log  33.QXDM           34.flash        35.adb         */
echo /* 41.traceview 42.usbview                       88.exit         99.edit        */
echo /*===============================================================v2.0===========*/
set /p choice=select (1-99):

if "%choice%"=="1" goto menu_mbim
if "%choice%"=="2" goto driver_info
if "%choice%"=="3" goto dm_open
if "%choice%"=="4" goto menu_at_commands
if "%choice%"=="5" goto inf_verify
if "%choice%"=="11" goto wireshark_open
if "%choice%"=="12" goto TelephonyTool
if "%choice%"=="13" goto TextAnalysisTool.NET
if "%choice%"=="14" goto teraterm
if "%choice%"=="15" goto menu_pep
if "%choice%"=="21" goto sku_set
if "%choice%"=="22" goto test_set
if "%choice%"=="23" goto menu_driver_del
if "%choice%"=="24" goto menu_service
if "%choice%"=="25" goto menu_acpi
if "%choice%"=="31" goto menu_nettrace
if "%choice%"=="32" goto menu_driver_log
if "%choice%"=="33" goto qxdm
if "%choice%"=="34" goto menu_flash
if "%choice%"=="35" goto menu_adb
if "%choice%"=="41" goto traceview
if "%choice%"=="42" goto usbview
if "%choice%"=="88" goto exit
if "%choice%"=="99" goto edit

echo Input invalid!
pause
goto menu

:menu_at_commands
echo /*==============================================================================*/
echo /* 1.AT*UCOMP=1,1,101F   2.AT*BBOOTHOLD=edl  3.AT*MPCFCCAUTH?  4.AT*BRESET      */
echo /* 9.back                                                                       */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto UCOMP
if "%choice%"=="2" goto BBOOTHOLD
if "%choice%"=="3" goto MPCFCCAUTH
if "%choice%"=="4" goto BRESET
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_at_commands

:menu_mbim
echo /*==============================================================================*/
echo /* 1.radio   2.interfaces  3.signal  4.ready_info  9.back                       */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto radio
if "%choice%"=="2" goto interfaces
if "%choice%"=="3" goto signal
if "%choice%"=="4" goto ready_info
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_mbim

:menu_nettrace
echo /*==============================================================================*/
echo /* 1.start  2.stop  3.del_registry  9.back                                      */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto nettrace_start
if "%choice%"=="2" goto nettrace_stop
if "%choice%"=="3" goto nettrace_delete
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_nettrace

:menu_driver_log
echo /*==============================================================================*/
echo /* 1.start  2.stop  9.back                                                      */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto driver_log_start
if "%choice%"=="2" goto driver_log_stop
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_driver_log

:menu_driver_del
echo /*==============================================================================*/
echo /* 1.DW5826_del  2.driver_del  9.back                                           */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto DW5826_del
if "%choice%"=="2" goto driver_del
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_driver_del

:menu_service
echo /*==============================================================================*/
echo /* 1.start  2.stop  3.check  4.fw_disable  5.fw_enable  9.back                  */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto service_start
if "%choice%"=="2" goto service_stop
if "%choice%"=="3" goto service_check
if "%choice%"=="4" goto fw_disable
if "%choice%"=="5" goto fw_enable
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_service

:menu_flash
echo /*==============================================================================*/
echo /* 1.start  2.check  9.back                                                     */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto flash_start
if "%choice%"=="2" goto flash_check
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_flash

:menu_adb
echo /*========================================================================*/
echo /* 1.shell   2.w_disable   3.qbi_log_start  4.qbi_log_stop  5.qbi_log_pull*/
echo /* 6.remount 7.qbi_log_size                                 9.back        */
echo /*========================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto shell
if "%choice%"=="2" goto w_disable
if "%choice%"=="3" goto qbi_log_start
if "%choice%"=="4" goto qbi_log_stop
if "%choice%"=="5" goto qbi_log_pull
if "%choice%"=="6" goto remount_root
if "%choice%"=="7" goto qbi_log_size
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_adb

:menu_acpi
echo /*==============================================================================*/
echo /* 1.dump  9.back                                                               */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto acpi_dump
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_acpi

:menu_pep
echo /*==============================================================================*/
echo /* 1.PEP checker  9.back                                                        */
echo /*==============================================================================*/
set /p choice=select (1-9):

if "%choice%"=="1" goto pep_checker
if "%choice%"=="9" goto menu

echo Input invalid!
pause
goto menu_pep

:UCOMP
start "" "%current_path%M2PE_Tool\M2PE_Tool.exe" AT*UCOMP=1,1,101F
goto menu

:BBOOTHOLD
start "" "%current_path%M2PE_Tool\M2PE_Tool.exe" AT*BBOOTHOLD=edl
goto menu

:MPCFCCAUTH
start "" "%current_path%M2PE_Tool\M2PE_Tool.exe" AT*MPCFCCAUTH?
goto menu

:BRESET
start "" "%current_path%M2PE_Tool\M2PE_Tool.exe" AT*BRESET
goto menu

:radio
netsh mbn show radio %cellular_interface%
netsh mbn show connection %cellular_interface%
goto menu

:interfaces
netsh mbn show interfaces
goto menu

:signal
netsh mbn show signal %cellular_interface%
goto menu

:ready_info
netsh mbn show readyinfo %cellular_interface%
goto menu

:nettrace_start
netsh trace start wireless_dbg,provisioning overwrite=yes persist=yes level=5 capture=yes maxSize=0 filemode=single
goto menu

:nettrace_stop
netsh trace stop
goto menu

:nettrace_delete
echo Delete all NetTrace folder under "HKEY_LOCAL_MACHINE\SYSTEM\ControlSet001\Control\WMI\Autologger"
echo HKEY_LOCAL_MACHINE\SYSTEM\ControlSet001\Control\WMI\Autologger | clip
regedit.exe
goto menu

:commands
echo AT*UCOMP=1,1,101F
echo AT*BBOOTHOLD=edl
echo AT*MPCFCCAUTH?
echo AT*BPCINFO?
echo AT*BRESET
goto menu

:sku_set
reg add "HKEY_LOCAL_MACHINE\HARDWARE\DESCRIPTION\System\BIOS" /v "SystemSKU" /t REG_SZ /d "0CB2" /f
goto menu

:test_set
bcdedit /set testsigning on
echo Reboot the machine to enable Testing mode.
pause
goto menu

:driver_info
echo Driver info under "HKEY_LOCAL_MACHINE\SYSTEM\ControlSet001\Enum\USB\VID_413C&PID_8217&MI_XX"
echo HKEY_LOCAL_MACHINE\SYSTEM\ControlSet001\Enum\USB\ | clip
regedit.exe
goto menu

:dm_open
start devmgmt.msc
goto menu

:wireshark_open
echo Add filter parameters "--p=Microsoft-Windows-Wmbclass-Opn"
echo netsh trace convert .\netracelog.etl .\netracelog.txt
echo Get-Content netracelog.txt | Where-Object {$_ -notmatch "No Format Information found"} | Set-Content netracelog_clean.txt
start "" "%current_path%WiresharkPortable64\WiresharkPortable64.exe"
goto menu

:TelephonyTool
start "" "%current_path%TelephonyTool\TelephonyTool.exe"
goto menu

:TextAnalysisTool.NET
start "" "%current_path%TextAnalysisTool.NET\TextAnalysisTool.NET.exe"
goto menu

:teraterm
start "" "C:\Program Files (x86)\teraterm5\ttermpro.exe"
goto menu

:DW5826_del
start "" "C:\Program Files (x86)\Dell Inc\DW5826e\uninstall.exe"
goto menu

:driver_del
start "" "%current_path%DriverStoreExplorer.v0.11.92\Rapr.exe"
goto menu

:driver_log_start
%current_path%\Host_driver_log\"Enable host log.bat"
goto menu

:driver_log_stop
echo Delete all setting
reg delete "HKLM\system\ControlSet001\Control\WMI\Autologger\QNET" /f
reg delete "HKLM\system\ControlSet001\Control\WMI\Autologger\MHI" /f
pause
goto menu

:inf_verify
set directory=%current_path%\infverify
for %%f in ("%directory%\*.inf") do (
  %current_path%infverify\infverif.exe /h /v %%f
)
goto menu

:qxdm
start "" "C:\Program Files\Qualcomm\QXDM5\QXDM.exe" /config "%current_path%\QXDM\Default+QBI.dmc"
goto menu

:service_start
sc start %cellular_service%
goto menu

:service_stop
sc stop %cellular_service%
goto menu

:service_check
sc query %cellular_service% | findstr /i "RUNNING"
if %errorlevel% equ 0 (
  echo %cellular_service% start
) else (
  echo %cellular_service% stop
)
goto menu

:fw_disable
echo "HKEY_LOCAL_MACHINE\SYSTEM\ControlSet001\Control\Palcom\DW5826eService"
reg add "HKEY_LOCAL_MACHINE\SYSTEM\ControlSet001\Control\Palcom\DW5826eService" /v "FWUpdate" /t REG_SZ /d "No" /f
goto menu

:fw_enable
echo "HKEY_LOCAL_MACHINE\SYSTEM\ControlSet001\Control\Palcom\DW5826eService"
reg add "HKEY_LOCAL_MACHINE\SYSTEM\ControlSet001\Control\Palcom\DW5826eService" /v "FWUpdate" /t REG_SZ /d "auto" /f
goto menu

:flash_start
start "" "%current_path%UT_Flash_Tool\ZXL1_ZXL2_FlashTool_V2.0.3.8_4K\Tool\FlashTool.exe"
goto menu

:flash_check
start "" "%current_path%UT_Flash_Tool\ZXL1_ZXL2_FlashTool_V2.0.3.8_4K\UMI\UMI.exe"
goto menu

:shell
start .
start cmd /k "%adb% wait-for-device shell"
goto menu

:remount_root
start .
start cmd /k "%adb% wait-for-device && %adb% shell mount -o remount,rw /dev/root /"
goto menu

:w_disable
%adb% wait-for-device && %adb% shell cat /sys/kernel/debug/gpio && %adb% shell cat /data/persist/rfs/shared/w_disable
goto menu

:qbi_log_start
%adb% wait-for-device && %adb% shell touch /data/mbimd/qbi_enable_logging &&  %adb% shell "printf '\x80\x84\x1E\x00' > /data/mbimd/qbi_enable_logging" && %adb% shell chown radio:radio /data/mbimd/qbi_enable_logging
echo "Reboot module to start logging"
goto menu

:qbi_log_stop
%adb% wait-for-device && %adb% shell rm -rf /data/mbimd/qbi_enable_logging && %adb% shell rm -rf /data/mbimd/qbi_current_log_file.txt && %adb% shell rm -rf /data/mbimd/qbi_previous_file.txt && %adb% shell rm -rf /data/mbimd/*.txt
goto menu

:qbi_log_pull
%adb% wait-for-device && %adb% pull /data/mbimd/qbi_current_log_file.txt %current_path%\log\qbi_current_log_file.txt && %adb% pull /data/mbimd/qbi_previous_log_file.txt %current_path%\log\qbi_previous_log_file.txt && %adb% pull /data/mbimd/qbi_oldest_log_file.txt %current_path%\log\qbi_oldest_log_file.txt
goto menu

:qbi_log_size
echo adb shell "printf '\x80\x84\x1E\x00' ^> /data/mbimd/qbi_enable_logging"
goto menu

:acpi_dump
echo ACPI Dump...
start "ACPI Dump" cmd /k "cd /d "%current_path%iasl-win-20250404\" && del *.dat *.dsl /q && acpidump.exe -b -o acpi_tables.dat && iasl.exe -d *.dat && del *.dat"
goto menu

:pep_checker
echo PEP Checker...
start "PEP Checker" cmd /k "cd /d "%current_path%PEP Checker v2.2.2.3\" && PEPChecker.exe"
goto menu

:traceview
start "" "%current_path%traceview\traceview.exe"
goto menu

:usbview
start "" "%current_path%usbview\usbview.exe"
goto menu

:exit
exit

:edit
notepad "%current_path%_mbn_show.bat"
pause</script>

# MBIM / QBI 架構

## 概述

Qualcomm QBI (Qualcomm MBIM Interface) 實作，橋接主機端 MBIM 協定與數據機端 QMI 介面。
運作於 Linux 使用者空間，透過 USB 與 host 溝通，透過 SMD 與數據機溝通。

## 目錄結構

```
mbim/
├── qbi/
│   ├── framework/   # 核心框架（task、msg、txn、svc、qmi）
│   ├── platform/    # Linux 平台實作
│   ├── svc/         # 21 個 Device Service 實作
│   └── test/        # 單元測試框架
├── qmi_svc/         # QMI IDL 產生的 message 定義
└── wmsts/           # SMS PDU 編解碼工具
```

## 架構分層

```
Host (USB/MBIM)
      │
      ▼
Host Controller Layer    qbi_hc_linux.c
      │
      ▼
Message Layer            qbi_msg.c/.h       MBIM 封包解析/組裝
      │ 建立 qbi_txn_s
      ▼
Task Layer (事件迴圈)    qbi_task.c/.h      單一執行緒
      │
      ▼
Service Dispatch Layer   qbi_svc.c/.h       UUID+CID 路由
      │
   ┌──┴──┐
   ▼     ▼
Device  QMI Layer        qbi_qmi.c / qbi_qmi_txn.c / qbi_qmux.c
Services              │
(svc/)                ▼
                   Modem (QMI/QCCI/SMD)
```

## framework/ 核心模組

| 模組          | 職責                                              |
|---------------|---------------------------------------------------|
| qbi_task      | 主事件迴圈；命令類型：RX_DATA、QMI_RSP、QMI_IND  |
| qbi_msg       | MBIM 協定：OPEN/CLOSE/COMMAND_MSG 解析與回應組裝  |
| qbi_txn       | 交易生命週期管理；每個 MBIM 命令對應一個 qbi_txn_s|
| qbi_svc       | 服務註冊/分派；維護 CID dispatch table            |
| qbi_qmi       | QMI client 管理，透過 QCCI 與數據機通訊           |
| qbi_qmi_txn   | QMI 子交易（掛在父 qbi_txn_s 下）                |
| qbi_qmux      | QMUX 協定層（EXT_QMUX over MBIM）                |

## platform/ (Linux)

| 模組                | 職責                       |
|---------------------|----------------------------|
| qbi_os_linux        | pthread mutex/thread/timer |
| qbi_hc_linux        | USB MBIM 裝置讀寫          |
| qbi_qmux_smd_linux  | SMD 共享記憶體 QMI 傳輸    |
| qbi_nv_store_linux  | 非揮發性儲存（檔案系統）    |
| qbi_fwupd_linux     | 韌體更新                   |
| qbi_log_qxdm        | QXDM 診斷日誌              |

## Device Services（svc/）

每個 service 向框架註冊 qbi_svc_cfg_s：UUID、dispatch_tbl、open/close_fcn、qmi_reg_tbl

| ID | Service   | 說明                          |
|----|-----------|-------------------------------|
|  1 | BC        | Basic Connectivity            |
|  2 | SMS       | SMS 收發                      |
|  3 | USSD      | Unstructured SS Data          |
|  4 | PB        | Phonebook                     |
|  5 | STK       | SIM Toolkit                   |
|  6 | AUTH      | Authentication (AKA/SIM)      |
|  7 | EXT_QMUX  | QMUX over MBIM                |
|  9 | MSHSD     | MS Host Shutdown              |
| 10 | QMBE      | QTI MBIM Extensibility        |
| 11 | MSFWID    | MS Firmware ID                |
| 12 | ATDS      | AT&T Device Services          |
| 13 | QDU       | Qualcomm Device Update        |
| 14 | MSUICC    | MS UICC / SIM                 |
| 15 | BC_EXT    | MS Basic Connectivity Ext.    |
| 16 | MSSAR     | Selective Absorption Rate     |
| 17 | VOICE_EXT | MS Voice Extension            |
| 18 | QIMBE     | QTI Internal MBIMEx           |
| 19 | OOBE      | Out of Box Experience         |
| 20 | CS        | Carrier Subsidy (SIM lock)    |
| 21 | CEIMBE    | Linux AT over MBIM            |

## 資料流

```
MBIM_COMMAND_MSG (host)
  → qbi_msg 解析 → qbi_txn_s
  → qbi_task_cmd_send(RX_DATA)
  → qbi_svc_dispatch → CID handler → qbi_svc_action_e

SEND_QMI_REQ → qbi_qmi 發請求 → 等 QMI_RSP callback
SEND_RSP     → qbi_msg 組 MBIM_COMMAND_DONE → host
```

## Action 狀態機

| Action          | 含義                                       |
|-----------------|--------------------------------------------|
| SEND_QMI_REQ    | 分派 qmi_txns 中的 QMI 請求並等待回應      |
| WAIT_ASYNC_RSP  | 等待非同步回應                             |
| SEND_RSP        | 回應就緒，送給 host                        |
| ABORT           | 錯誤，通知 host 並釋放交易                 |

## qbi_txn_s 核心欄位

```c
typedef struct qbi_txn_struct {
  qbi_ctx_s            *ctx;
  uint32                iid;           // 內部追蹤 ID
  qbi_svc_id_e          svc_id;
  uint32                txn_id;        // MBIM TransactionId
  uint32                cmd_type;      // QUERY / SET / EVENT / INTERNAL
  uint32                cid;
  uint32                status;
  qbi_util_buf_s        req;           // request InformationBuffer
  qbi_util_buf_s        rsp;           // response 固定長度
  qbi_util_buf_chain_s  rsp_databuf;   // response DataBuffer（變長）
  qbi_util_list_s       qmi_txns;      // 子 QMI 交易列表
  uint32                qmi_txns_pending;
  void                 *info;          // 服務自訂狀態
  qbi_os_time_ms_t      timeout;
} qbi_txn_s;
```

## QMI Indication 管理

- **靜態** qbi_svc_ind_reg_static：服務 open 時常駐
- **動態** qbi_svc_ind_reg_dynamic：有時效性，等待特定事件
- **Reference count** qbi_svc_ind_qmi_ref_cnt_*：多個 CID 共享同一 indication 時，
  透過 ref count 決定是否實際向數據機訂閱/取消訂閱

## qmi_svc/ QMI 服務定義（IDL 產生）

QBI 內部 enum (qbi_qmi_svc_e) 與 QMI wire service ID 對照：

| QBI enum ID | 符號           | Wire ID (hex) | Wire ID (dec) | 說明                              |
|-------------|----------------|---------------|---------------|-----------------------------------|
|  0          | DMS            | 0x02          |  2            | Device Management Service         |
|  1          | NAS            | 0x03          |  3            | Network Access Service            |
|  2          | WMS            | 0x05          |  5            | Wireless Messaging Service        |
|  3          | UIM            | 0x0B          | 11            | User Identity Module              |
|  4          | CAT (v2)       | 0x0A          | 10            | Card Application Toolkit v2       |
|  5          | PBM            | 0x0C          | 12            | Phonebook Manager                 |
|  6          | Voice (v2)     | 0x09          |  9            | Voice Service v2                  |
|  7          | WDA            | 0x1A          | 26            | Wireless Data Administrative Svc  |
|  8          | SSCTL          | 0x2B          | 43            | Subsystem Control Service         |
|  9          | DSD            | 0x2A          | 42            | Data System Determination         |
| 10          | PDC            | 0x24          | 36            | Persistent Device Configuration   |
| 11          | SAR            | 0x11          | 17            | Specific Absorption Rate          |
| 12          | TS             | 0x17          | 23            | Thermal Sensor Service            |
| 13 ~ 13+N   | WDS (×sessions)| 0x01          |  1            | Wireless Data Service (多 client) |
| —           | DPM            | 0x2F          | 47            | Data Port Mapper                  |
| —           | CTL            | 0x00          |  0            | QMI Control Service               |

## wmsts/

獨立 SMS PDU 編解碼函式庫，支援 GSM/UMTS（3GPP）與 CDMA（3GPP2），
供 qbi_svc_sms_pdu.c 使用。

---

## 實例：AT over MBIM（QMBE CID 7）

以 AT command 過 MBIM 為範例，說明一個非 QMI 的同步型 CID 如何在框架內實作。

### 位置與 CID 定義

QMBE 服務 (ID 10) 的 CID 7，UUID = `{2d0c12c9-0e6a-495a-915c-8d174fe5d63c}`。
只支援 **Query**，無 Set handler。

```c
// qbi_svc_qmbe_mbim.h
QBI_SVC_QMBE_MBIM_CID_AT_COMMAND = 7   // M2PE tool 使用
```

### 資料結構

```c
// 請求（host → QBI）
typedef PACK(struct) {
  char   at_cmd[256];    // AT 命令字串（不含 \r）
  uint32 at_cmd_len;
} qbi_svc_qmbe_at_command_q_req_s;

// 回應（QBI → host）
typedef PACK(struct) {
  char   at_cmd_rsp[4096]; // modem 原始回應
  uint32 at_cmd_rsp_len;
  char   at_cmd_req[256];  // echo：實際送出的命令（含 \r）
  uint32 at_cmd_req_len;
} qbi_svc_qmbe_at_command_q_rsp_s;
```

### 資料流

```
Host MBIM Query (CID=7)
  ↓
qbi_msg → qbi_txn_s (cmd_type=QUERY)
  ↓
qbi_svc dispatch → qbi_svc_qmbe_at_command_q_req()
  ↓  附加 '\r'，呼叫 qbi_qmbe_smd_write_msg()
open("/dev/smd7") → write(at_cmd) → poll/read 回應 → close
  ↓  action = SEND_RSP（不走 QMI 路徑）
Host MBIM Response (qbi_svc_qmbe_at_command_q_rsp_s)
```

### 與標準 QMI 路徑的對比

| 面向 | 標準 QMI CID（如 BC、NAS） | AT over MBIM（QMBE CID 7） |
|------|---------------------------|---------------------------|
| 後端協定 | QMI (QCCI) | AT over SMD (`/dev/smd7`) |
| 非同步 | 是（SEND_QMI_REQ + callback） | 否（同步阻塞讀取） |
| Action 流程 | SEND_QMI_REQ → callback → SEND_RSP | 直接 SEND_RSP |
| qmi_txns | 有子交易 | 無 |

### Final Response 判斷（`is_final_resp()`）

SMD 讀取在收到下列字串後停止（最多重試 10 次）：

```
尾端比對：OK\r\n  ERROR\r\n  BUSY\r\n  NO ANSWER\r\n  NO CARRIER\r\n  NO DIALTONE\r\n
子字串比對：+CME ERROR:  +CMS ERROR:
```

### Handler 注册

```c
// qbi_svc_qmbe_cmd_hdlr_tbl[]（order 對應 CID 號碼）
,{qbi_svc_qmbe_at_command_q_req, 0, NULL, 0}
//  query_func              min_q_len  set_func  min_s_len
```

注册於 `qbi_svc_qmbe_init()` → `qbi_svc_reg()` 完成掛載。
詳見 `qbi/svc/src/qbi_svc_qmbe.c`。
</script>

# QmuxMdm 驅動架構

## 概述

Qualcomm Windows KMDF 核心驅動套件，在 Windows AP 與 Qualcomm 數據機之間
提供 QMI（Qualcomm MSM Interface）通道。包含三個 .sys 驅動。

## 專案結構

```
QmuxMdm.sln
├── Qmux/            → qcqmux.sys       主驅動 / 上層
├── QmuxUsb/         → qcqmuxusb.sys    USB 傳輸下層 filter
├── QmuxPCIe/        → qcqmuxpcie.sys   PCIe/MHI 傳輸下層 filter
└── QmuxMdmPackage/  → .inf 封裝
```

## 分層架構

```
User/Kernel QMI clients (QCCI or Gobi)
         │  DeviceIoControl IOCTL
         ▼
┌────────────────────────────────────┐
│          qcqmux.sys (Qmux)         │  Function driver
│  - QMI QMUX multiplexer            │  Device: \\.\QMUX\QmuxDevice
│  - 管理多條 RMNET conn_id          │  GUID: 7DCB3244-C836-4A0C
│  - QMI CTL 協定 (sync/ver info)   │
│  - Bus PDO → GNSS / NetAdapter    │
│  - Worker thread 非同步處理        │
└──────────────┬─────────────────────┘
               │ IOCTL_INTERNAL_QMUX_INTERCONNECT_*
               │ 共享 Kernel Event 信號
               ▼
    ┌──────────┴──────────┐
    │                     │
qcqmuxusb.sys       qcqmuxpcie.sys       ← Lower filter（擇一）
(USB 傳輸)           (PCIe/MHI 傳輸)
USB Bulk IN/OUT      pcieio_public API
+ Interrupt pipe     MHI interface
    │                     │
    └──────────┬──────────┘
               ▼
         Qualcomm Modem
```

## Qmux ↔ 傳輸層介面（QmuxPublic.h）

上層 Qmux 透過 Internal IOCTL 控制下層，透過共享 Kernel Event 收資料通知：

| IOCTL | 方向 | 用途 |
|-------|------|------|
| IOCTL_INTERNAL_QMUX_INTERCONNECT_OPEN_PORT  | Qmux → 傳輸 | 開啟，傳入 hReadEvent/hOpenEvent/hCloseEvent |
| IOCTL_INTERNAL_QMUX_INTERCONNECT_CLOSE_PORT | Qmux → 傳輸 | 關閉連線 |
| IOCTL_INTERNAL_QMUX_INTERCONNECT_RX_PEEK    | Qmux → 傳輸 | 查詢是否有資料待讀 |
| hReadEvent / hOpenEvent / hCloseEvent       | 傳輸 → Qmux | signal 通知 |

## Qmux 對外 IOCTL 介面（qmux_common.h）

| IOCTL | 用途 | 用戶端 |
|-------|------|--------|
| IOCTL_QMUX_CLIENT_INIT              | 初始化 client               | QCCI / Gobi |
| IOCTL_QMUX_TX_MSG                   | 傳 QMI 訊息到數據機         | QCCI / Gobi |
| IOCTL_QMUX_RX_MSG                   | 從數據機收 QMI 訊息         | QCCI / Gobi |
| IOCTL_QMUX_CLIENT_RELEASE           | 釋放 client                 | QCCI / Gobi |
| IOCTL_QMUX_ALLOC_CLIENT_ID          | 申請 QMI client ID          | Gobi only   |
| IOCTL_QMUX_QMI_GET_MEID             | 取得 MEID                   | Gobi only   |
| IOCTL_QMUX_QMI_GET_SVC_VER[_EX]    | 取得 service 版本           | Gobi only   |
| IOCTL_QMUX_QMI_CTL_SET_DATA_FORMAT  | 設 QoS / link layer 格式   | —           |
| IOCTL_QMUX_READ_OOB                 | 讀 OOB 事件（server 上下線）| —           |

## QMI Connection ID（RMNET 通道）

qmi_connection_id_type 定義多條虛擬 QMI 通道：

| 範圍                          | 對應 SMD/SDIO 通道          |
|-------------------------------|-----------------------------|
| RMNET_0 ~ 8                   | SMD DATA5 ~ DATA16_CNTL     |
| SIO_PORT_SDIO_MUX_A2_REV_IP_0~8 | SMD DATA23 ~ DATA31_CNTL |
| RMNET_SDIO_0 ~ 7             | SDIO0 ~ SDIO7_CNTL          |
| RMNET_12, 13, PROXY           | 額外通道                    |

## 關鍵資料結構

| 結構                    | 檔案               | 用途                                          |
|-------------------------|--------------------|-----------------------------------------------|
| QMUX_DEVICE_CONTEXT     | qmux.h             | 主驅動裝置實例：連線、queue、client list、MHI |
| CLIENT_CONTEXT          | qmux.h             | 每個 file handle 的 read/write/OOB queue      |
| QmuxClientInfo          | qmux.h             | service_id、client_id、版本、QCCI/Gobi 類型   |
| InterconnectIoTargetInfo| qmux.h             | 每條 conn_id 的 IoTarget 及 rx buffer         |
| USB_CONTEXT             | UsbOperations.h    | USB pipes、read packet pool（8 × 8KB）        |
| QMUXPCIE_DEVICE_CONTEXT | QmuxPCIe/Device.h  | PCIe IO request pool（8 × 8KB）、pcieio ctx   |

## INF 安裝邏輯

### USB 路徑
- 匹配：USB\VID_05C6&PID_9085&MI_04 或 USB\VID_05C6&PID_90E2&MI_02
- qcqmuxusb.sys → LowerFilters
- qcqmux.sys → Associated Service（function driver）

### PCIe 路徑
- 匹配：{3a4d657c-0a42-4501-9627-ba1b76ffc39d}\QcQmux_OEM_MUST_CHANGE_THIS
- qcqmuxpcie.sys → LowerFilters
- qcqmux.sys → Associated Service

### Bus PDO
- GUID: {7DCB3244-C836-4A0C-A1E9-BD68D385AA2B}
- 子裝置：GNSS PDO、NetAdapter PDO（OEM 需設定）

## Client 類型

| 類型 | 說明 |
|------|------|
| QCCI | 標準 QMI QCCI 客戶端（現代路徑）|
| Gobi | 舊式 Gobi 驅動客戶端（legacy，需 ALLOC_CLIENT_ID 等額外 IOCTL）|

Android Linux 使用者空間常駐程式，向 QMI ATCOP 服務註冊，
攔截來自數據機的 AT 命令並在本地處理或轉發給外部客戶端。

## 整體架構

```
Modem（QMI ATCOP Service）
      │  QMI indication（AT 命令）
      ▼
┌─────────────────────────────────────────┐
│            atfwd-daemon                  │
│                                         │
│  QMI 層          →  ds_cmdq            │
│  (indication cb)     (事件佇列)          │
│                       │                 │
│               atfwd_cb_cmd_exec()       │
│                       │                 │
│           atfwd_process_new_request()   │
│                       │                 │
│      ┌────────────────┼──────────────┐  │
│      ▼                ▼              ▼  │
│  inline handler  CmdHandle_lookup  forward│
│  (+CFUN,*B*等)  (handler table)  to client│
└───────────────────────────────────────┬─┘
                                        │ UNIX domain socket / NetLink
                                        ▼
                              外部 AT 客戶端（最多 20 個）
```

## 模組說明

| 檔案 | 功能 |
|------|------|
| atfwd_daemon.c        | 主程式：QMI 初始化、AT 命令註冊、事件調度 |
| atfwd_cmdhandle.c     | 函式指標 handler table；CmdHandle_lookup() 路由 |
| atfwd_customcmd_handle.c | 簡單 set/get 型命令，NV 存取模式 |
| atfwd_unix.c          | UNIX domain socket + NetLink socket 通訊層 |
| atfwd_mtdop.c         | MTD/NAND flash 讀寫（韌體更新、image 操作）|
| impref_pri.c          | IM 偏好（*BIMPREF）優先級管理 |
| supl_event.c          | SUPL 定位事件（suplstart / suplreply / suplend）|

## main() 啟動流程

```
main()
  ├── Diag_LSM_Init()                      # 診斷日誌
  ├── atfwd_signal_init()                  # SIGINT/SIGTERM
  ├── atfwd_cmdq_init()                    # ds_cmdq 事件佇列
  ├── atfwd_dll_init()                     # pending indication 鏈結串列
  ├── at_get_service_object_v01()          # QMI AT service object
  ├── atfwd_reg_for_service_up_event()     # 等待 modem UP
  ├── atfwd_unix_netlink_init()            # NetLink 事件 socket
  ├── hwidTorfs()                          # HWID 寫入 RFS
  ├── lwm2mDebugStart(true)               # LwM2M debug 執行緒
  └── atfwd_unix_listener_init()           # UNIX socket 監聽（主迴圈）
```

## 事件處理流程

### QMI Modem UP
```
atfwd_sys_up_cb()
  → cmdq enqueue(ATFWD_UP_EV)
  → atfwd_qmi_client_init()              # qmi_client_init_instance
  → atfwd_register_legacy_at_commands()  # 向 ATCOP 註冊 82 條命令
  → atfwd_unix_send_event(DS_AT_UP_EV)   # 通知所有客戶端
```

### AT 命令收到
```
qmi_at_unsol_ind_cb()
  → cmdq enqueue(ATFWD_CMD_IND_EV)
  → atfwd_process_new_request()
      ├── 1. inline handler（+CFUN, *BPHASEID 等硬編碼）
      ├── 2. CmdHandle_lookup(name) → atcmd_handler()
      ├── 3. custom_CmdHandle_lookup(name) → Custom_AtCmdHandle()
      └── 4. 無 handler → 轉發給外部 client（dll + UNIX msg）
```

## AT 命令分發優先順序

```
1. inline if/else（atfwd_process_new_request 內硬編碼，legacy + *B* 系列）
2. CmdHandle_lookup()        → atfwd_cmdhandle.c handler table
3. custom_CmdHandle_lookup() → atfwd_customcmd_handle.c set/get table
4. 轉發給 UNIX 客戶端（pending dll + netlink 通知）
```

## 主要 AT 命令分類（共 82 條）

| 前綴 | 範例 | 說明 |
|------|------|------|
| 標準 | +CFUN, $QCPWRDN         | 功能/電源 |
| *U*  | *UCOMP, *USPEED, *UPID  | USB 組態 |
| *B*  | *BRESET, *BBOOTHOLD, *BFWVER, *BIMAGE, *BIMPREF | Boot/韌體 |
| *PC* | *PCTEMP, *PCVOLT        | 電源/溫度監控 |
| *GPS*| *GPSELNA, *GPSCONF      | GPS 設定 |
| AT!  | AT!FLOG, AT!ERR, AT!CHKSB | 診斷/debug |
| LwM2M| *LWM2M, *LWM2MURL      | LwM2M IoT 管理 |
| SAR  | *SARDEFAULTSTATE, *SARINDEX | SAR 設定 |
| SUPL | *SUPLSTART, *SUPLREPLY  | SUPL 定位 |

## customcmd_handle 模式

適用於 NV 讀寫型命令，統一 set/get pattern：

```c
typedef struct {
    char atcmd[65];
    atcmd_set_handler  set_fcn;   // AT cmd=<value>
    atcmd_get_handler  get_fcn;   // AT cmd?
    char valid_values[5];         // 合法值範圍
} atfwd_customcmd_handler;
```

命令：WakeUpHostEN、SingleApnSwitch、FastEnum、USBSerialEn、
      GPSSel/Enable/LPM、ProviderNameFmt、MbimType、GpioTunerEnable

## 通訊介面

| 介面 | 用途 |
|------|------|
| QMI ATCOP（qmi_client）| 從數據機收 AT 命令；回傳 response |
| QMI DMS               | 取得裝置資訊（序號等）|
| NetLink socket        | 向客戶端推送 UP/DOWN/CMD 非同步事件 |
| UNIX domain socket    | 雙向：接收客戶端 AT 請求 + 回傳 response |

# AT over MBIM — QBI 實現

## 概述

QBI (Qualcomm MBIM Interface) 透過 **QMBE** (Qualcomm Mobile Broadband MBIM Extensibility)
裝置服務的 **CID 7** 提供 AT over MBIM 功能，主要供 **M2PE 工具**使用。

AT 命令由 host 透過 MBIM Query 送入，QBI 將其轉發至 modem 的 SMD 通道 (`/dev/smd7`)，
讀回 AT 回應後透過 MBIM Response 回傳 host。

---

## 服務識別

| 屬性 | 值 |
|------|-----|
| 服務 | QMBE (Qualcomm MB MBIM Extensibility) |
| UUID | `{2d0c12c9-0e6a-495a-915c-8d174fe5d63c}` |
| CID  | **7** (`QBI_SVC_QMBE_MBIM_CID_AT_COMMAND`) |
| 操作 | Query only（無 Set handler） |

QMBE CID 清單（`qbi_svc_qmbe_mbim.h`）：

```c
QBI_SVC_QMBE_MBIM_CID_DIAG_CONFIG  = 1
QBI_SVC_QMBE_MBIM_CID_DIAG_DATA    = 2
QBI_SVC_QMBE_MBIM_CID_DEVICE_LOG   = 3
QBI_SVC_QMBE_MBIM_CID_SIMLOCK      = 4
// 5, 6 未定義
QBI_SVC_QMBE_MBIM_CID_AT_COMMAND   = 7   ← AT over MBIM
```

---

## 資料結構（`qbi_svc_qmbe_mbim.h`）

```c
/* Host → QBI: AT 命令請求 */
typedef PACK(struct) {
  char   at_cmd[256];    // AT 命令字串（不含 \r）
  uint32 at_cmd_len;     // 字串長度
} qbi_svc_qmbe_at_command_q_req_s;

/* QBI → Host: AT 命令回應 */
typedef PACK(struct) {
  char   at_cmd_rsp[4096]; // modem 回傳的原始 AT 回應
  uint32 at_cmd_rsp_len;
  char   at_cmd_req[256];  // echo：QBI 實際送出的命令（含 \r）
  uint32 at_cmd_req_len;
} qbi_svc_qmbe_at_command_q_rsp_s;
```

---

## 資料流

```
Host (M2PE Tool)
  │  MBIM_COMMAND_MSG (type=Query, CID=7)
  │  InformationBuffer = qbi_svc_qmbe_at_command_q_req_s
  ▼
USB/PCIe Transport
  ▼
qbi_msg.c → qbi_svc.c  (框架路由)
  ▼
qbi_svc_qmbe_at_command_q_req()   [qbi_svc_qmbe.c:1099]
  │  1. 從 txn->req.data 取出 at_cmd
  │  2. 在末尾附加 '\r'
  │  3. 呼叫 qbi_qmbe_smd_write_msg()
  ▼
qbi_qmbe_smd_write_msg()          [qbi_svc_qmbe.c:985]
  │  open("/dev/smd7", O_RDWR | O_NOCTTY | O_NDELAY)
  │  write(fd, at_cmd, len)
  │  poll/select 讀回回應（最多 10 次重試）
  │  close(fd)
  ▼
Modem ATCOP (SMD channel 7)
  │  AT 命令處理
  ▼
/dev/smd7 (read back)
  ▼
qbi_svc_qmbe_at_command_q_req()
  │  action = QBI_SVC_ACTION_SEND_RSP
  ▼
Host：MBIM_COMMAND_DONE (含 qbi_svc_qmbe_at_command_q_rsp_s)
```

---

## SMD 讀取細節（`qbi_qmbe_smd_write_msg`）

- 裝置檔：`/dev/smd7`
- 最大重試：`QBI_QMBE_SMD_MAX_RETRY_COUNT = 10`
- 有兩種讀取模式（編譯期選擇）：
  - `#ifdef ATCLI_V3`：使用 `select()` + 300 ms timeout per iteration
  - 否則：使用 `poll(POLLIN | POLLPRI | POLLERR, timeout=-1)`

---

## Final Response 判斷（`is_final_resp()`）

收到回應後持續累積，直到符合下列 **結尾字串** 或 **內含特殊字串** 才停止讀取：

**正常 final response（尾端比對）：**
```
OK\r\n  ERROR\r\n  BUSY\r\n  NO ANSWER\r\n  NO CARRIER\r\n  NO DIALTONE\r\n
```

**特殊 final response（子字串比對）：**
```
+CME ERROR:   +CMS ERROR:
```

---

## 關鍵原始檔

| 檔案 | 說明 |
|------|------|
| `qbi/svc/inc/qbi_svc_qmbe_mbim.h` | CID 定義、請求/回應結構體 |
| `qbi/svc/src/qbi_svc_qmbe.c` | AT command handler、SMD 傳輸實作 |
| `qbi/framework/src/qbi_svc.c` | CID dispatch 框架 |
| `qbi/framework/src/qbi_msg.c` | MBIM message 解析/組裝 |

---

## Handler 注册（cmd_hdlr_tbl）

```c
/* qbi_svc_qmbe_cmd_hdlr_tbl[] 中第 7 個 entry（CID 7）*/
,{qbi_svc_qmbe_at_command_q_req, 0, NULL, 0}
//  query_func               min_query_len  set_func  min_set_len
//  只支援 Query，不支援 Set
```

注册於 `qbi_svc_qmbe_init()` → `qbi_svc_reg()` 完成服務掛載。
